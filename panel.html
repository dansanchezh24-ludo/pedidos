<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel 🫐</title>
<script src="config.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; background:linear-gradient(160deg,#0b1a0b 0%,#132613 60%,#0b1a0b 100%); font-family:Georgia,serif; color:#e8f5e8; display:flex; flex-direction:column; align-items:center; padding:24px 16px 40px; }
.header { text-align:center; margin-bottom:20px; width:100%; max-width:620px; }
.header h1 { font-size:26px; color:#a8e6a3; letter-spacing:1px; text-shadow:0 0 24px rgba(168,230,163,0.28); }
.header p { color:#4a7a4a; font-size:12px; letter-spacing:1px; margin-top:3px; }
.tabs { display:flex; gap:6px; margin-bottom:24px; background:rgba(255,255,255,0.04); border-radius:14px; padding:4px; width:100%; max-width:620px; }
.tab { flex:1; padding:12px 0; background:none; border:none; border-radius:10px; color:#5a8a5a; font-size:14px; cursor:pointer; font-family:Georgia,serif; transition:all 0.2s; }
.tab.active { background:linear-gradient(135deg,#4caf50,#2e7d32); color:#fff; font-weight:bold; box-shadow:0 2px 14px rgba(76,175,80,0.38); }
.content { width:100%; max-width:620px; }
.view { display:none; flex-direction:column; gap:18px; }
.view.active { display:flex; }
label { display:block; margin-bottom:7px; color:#7ec87a; font-size:11px; letter-spacing:1.5px; font-weight:bold; }
input, select { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(168,230,163,0.25); border-radius:12px; color:#e8f5e8; font-size:16px; padding:14px 16px; outline:none; font-family:Georgia,serif; color-scheme:dark; }
.grand-total { background:linear-gradient(135deg,rgba(76,175,80,0.18),rgba(46,125,50,0.08)); border:1px solid rgba(168,230,163,0.25); border-radius:16px; padding:20px 22px; display:flex; justify-content:space-between; align-items:center; }
.fecha-filter { background:rgba(255,255,255,0.04); border:1px solid rgba(168,230,163,0.2); border-radius:12px; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.fecha-filter-row { display:flex; gap:8px; align-items:center; }
.fecha-filter select, .fecha-filter input[type="date"] { flex:1; background:rgba(0,0,0,0.3); border:1px solid rgba(168,230,163,0.25); border-radius:10px; color:#e8f5e8; font-size:14px; padding:10px 12px; }
.fecha-sep { color:#5a8a5a; font-size:13px; }
.clear-btn { background:rgba(255,100,100,0.15); border:1px solid rgba(255,100,100,0.3); border-radius:10px; color:#ff8a80; font-size:13px; padding:10px 14px; cursor:pointer; font-family:Georgia,serif; white-space:nowrap; }
.refresh-btn { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; color:#5a8a5a; font-size:13px; padding:8px 0; cursor:pointer; font-family:Georgia,serif; }
.cliente-table { width:100%; border-collapse:collapse; }
.cliente-table th { color:#7ec87a; font-size:11px; letter-spacing:1.5px; padding:8px 12px; text-align:left; border-bottom:1px solid rgba(168,230,163,0.2); }
.cliente-table th:last-child { text-align:right; }
.cliente-row { border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background 0.15s; }
.cliente-row:hover { background:rgba(76,175,80,0.08); }
.cliente-row td { padding:12px 12px; font-size:14px; }
.cliente-row td:last-child { text-align:right; color:#a8e6a3; font-weight:bold; }
.cliente-name { color:#e8f5e8; font-weight:bold; }
.cliente-sub { color:#6b9e6b; font-size:12px; margin-top:2px; }
.detail-row td { padding:6px 12px 6px 28px; font-size:13px; color:#aaa; background:rgba(0,0,0,0.2); }
.detail-row td:last-child { color:#a8e6a3; text-align:right; }
.total-row td { padding:14px 12px; font-weight:bold; border-top:2px solid rgba(168,230,163,0.3); color:#a8e6a3; }

/* ── KPIs (Tablero) ── */
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.kpi-card { background:rgba(255,255,255,0.045); border:1px solid rgba(168,230,163,0.18); border-radius:16px; padding:18px 20px; }
.kpi-label { font-size:10px; color:#6b9e6b; letter-spacing:1.5px; margin-bottom:6px; }
.kpi-val { font-size:25px; font-weight:bold; color:#a8e6a3; }
.kpi-val.naranja { color:#ffb74d; }
.kpi-val.rojo { color:#ff7070; }
.kpi-rango { text-align:center; color:#6b9e6b; font-size:11px; letter-spacing:1.5px; margin-bottom:14px; }
.kpi-mini-row { display:grid; grid-template-columns:1fr 1fr 1fr; background:rgba(0,0,0,0.2); border:1px solid rgba(168,230,163,0.12); border-radius:14px; padding:14px 18px; gap:8px; }
.kpi-mini { text-align:center; }
.kpi-mini-label { font-size:9px; color:#6b9e6b; letter-spacing:1px; margin-bottom:3px; }
.kpi-mini-val { font-size:16px; font-weight:bold; color:#e8f5e8; }
.kpi-block { background:rgba(255,255,255,0.03); border:1px solid rgba(168,230,163,0.12); border-radius:14px; padding:14px 18px; }
.kpi-block-title { font-size:9px; color:#6b9e6b; letter-spacing:1.5px; margin-bottom:10px; }
/* Gráfica ventas/costo/utilidad por periodo */
.periodo-toggle { display:flex; gap:4px; }
.periodo-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(168,230,163,0.2); border-radius:8px; color:#6b9e6b; font-size:10px; letter-spacing:0.5px; padding:5px 10px; cursor:pointer; font-family:Georgia,serif; }
.periodo-btn.active { background:rgba(76,175,80,0.25); border-color:rgba(168,230,163,0.5); color:#a8e6a3; font-weight:bold; }
.grafica-leyenda { display:flex; gap:16px; margin-bottom:10px; }
.leyenda-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#9db8a0; }
.leyenda-swatch { width:9px; height:9px; border-radius:2px; display:inline-block; }

/* ── PROVEEDOR TAB ── */
.prov-summary { background:linear-gradient(135deg,rgba(76,175,80,0.18),rgba(46,125,50,0.08)); border:1px solid rgba(168,230,163,0.25); border-radius:16px; padding:20px 22px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; text-align:center; }
.prov-stat-label { font-size:10px; color:#6b9e6b; letter-spacing:1.5px; margin-bottom:4px; }
.prov-stat-val { font-size:22px; font-weight:bold; color:#a8e6a3; }
.prov-stat-val.rojo { color:#ff7070; }
.prov-stat-val.naranja { color:#ffb74d; }
/* Tarjeta por fruta */
.fruta-card { background:rgba(255,255,255,0.04); border:1px solid rgba(168,230,163,0.15); border-radius:14px; overflow:hidden; }
.fruta-card-header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px 10px; }
.fruta-card-title { font-size:17px; font-weight:bold; color:#e8f5e8; }
.fruta-botes-big { font-size:28px; font-weight:bold; color:#a8e6a3; }
.fruta-botes-label { font-size:10px; color:#6b9e6b; letter-spacing:1px; text-align:right; }
.fruta-stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; background:rgba(0,0,0,0.2); padding:10px 18px; gap:8px; border-top:1px solid rgba(168,230,163,0.08); }
.fstat { text-align:center; }
.fstat-label { font-size:9px; color:#6b9e6b; letter-spacing:1px; margin-bottom:3px; }
.fstat-val { font-size:14px; font-weight:bold; color:#e8f5e8; }
.fstat-val.naranja { color:#ffb74d; }
/* Clientes dentro de la tarjeta */
.clientes-block { padding:12px 18px; border-top:1px solid rgba(168,230,163,0.08); }
.clientes-block-title { font-size:9px; color:#6b9e6b; letter-spacing:1.5px; margin-bottom:8px; }
.cliente-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:7px; }
.cliente-bar-row:last-child { margin-bottom:0; }
.cliente-bar-name { font-size:13px; color:#e8f5e8; min-width:90px; }
.cliente-bar-track { flex:1; background:rgba(255,255,255,0.07); border-radius:4px; height:8px; overflow:hidden; }
.cliente-bar-fill { height:8px; border-radius:4px; background:linear-gradient(90deg,#4caf50,#81c784); }
.cliente-bar-grams { font-size:12px; color:#a8e6a3; min-width:38px; text-align:right; }
/* Merma badge */
.merma-pill { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; font-weight:bold; }
.merma-ok { background:rgba(76,175,80,0.2); color:#a8e6a3; }
.merma-warn { background:rgba(255,183,77,0.15); color:#ffb74d; }
.pagado-pill { display:inline-block; font-size:10px; padding:2px 9px; border-radius:20px; font-weight:bold; cursor:pointer; }
.pagado-si { background:rgba(76,175,80,0.2); color:#a8e6a3; }
.pagado-no { background:rgba(255,183,77,0.15); color:#ffb74d; }
.pagado-pill:active { opacity:0.7; }
/* Pedido para proveedor */
.pedido-box { background:rgba(0,0,0,0.35); border:1px solid rgba(168,230,163,0.2); border-radius:14px; padding:16px 18px; }
.pedido-box-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.pedido-box-title { font-size:13px; font-weight:bold; color:#a8e6a3; letter-spacing:1px; }
.copy-btn { background:rgba(76,175,80,0.25); border:1px solid rgba(76,175,80,0.4); border-radius:8px; color:#a8e6a3; font-size:12px; padding:6px 14px; cursor:pointer; font-family:Georgia,serif; }
.copy-btn:active { background:rgba(76,175,80,0.5); }
.pedido-line { display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:14px; }
.pedido-line:last-of-type { border-bottom:none; }
.pedido-fruta { color:#e8f5e8; }
.pedido-cant { color:#7ec87a; font-size:13px; margin-left:6px; }
.pedido-costo { color:#a8e6a3; font-weight:bold; }
.pedido-total-row { display:flex; justify-content:space-between; border-top:2px solid rgba(168,230,163,0.25); padding-top:10px; margin-top:6px; font-size:15px; font-weight:bold; color:#a8e6a3; }
/* Elotes */
.elote-card { background:rgba(255,200,0,0.05); border:1px solid rgba(255,200,0,0.15); border-radius:14px; padding:16px 18px; }
.elote-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.elote-row { display:flex; justify-content:space-between; font-size:14px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.elote-row:last-child { border-bottom:none; }
</style>
</head>
<body>

<div class="header">
  <div style="font-size:36px;margin-bottom:4px">🫐</div>
  <h1>Panel</h1>
  <p>TABLERO · RESUMEN · PROVEEDOR</p>
</div>

<div class="tabs">
  <button class="tab active" id="tabTablero">📈 Tablero</button>
  <button class="tab" id="tabResumen">📊 Resumen</button>
  <button class="tab" id="tabProveedor">🛒 Proveedor</button>
</div>

<div class="content">
  <!-- ══ TABLERO (KPIs) ══ -->
  <div id="tablero" class="view active">
    <div class="fecha-filter">
      <label style="margin:0">RANGO DE FECHAS (OPCIONAL)</label>
      <div class="fecha-filter-row">
        <input type="date" id="kpiDesde">
        <span class="fecha-sep">a</span>
        <input type="date" id="kpiHasta">
        <button class="clear-btn" id="clearKpiRango">✕ Todo</button>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtnK">↻ Actualizar</button>
    <div id="kpiContent"></div>
  </div>

  <!-- ══ RESUMEN ══ -->
  <div id="resumen" class="view">
    <div class="grand-total">
      <div>
        <p style="font-size:11px;color:#6b9e6b;letter-spacing:1.5px" id="granTotalLabel">TOTAL GENERAL</p>
        <p id="granTotal" style="font-size:32px;font-weight:bold;color:#a8e6a3;margin-top:5px">$0</p>
      </div>
      <div style="text-align:right">
        <p id="numClientes" style="font-size:12px;color:#6b9e6b">0 clientes</p>
        <p id="numRegistros" style="font-size:12px;color:#6b9e6b;margin-top:3px">0 registros</p>
      </div>
    </div>
    <div class="fecha-filter">
      <label style="margin:0">FILTRAR POR FECHA DE ENTREGA</label>
      <div class="fecha-filter-row">
        <input type="date" id="fechaFiltro">
        <button class="clear-btn" id="clearFecha">✕ Limpiar</button>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn">↻ Actualizar</button>
    <div id="resumenCards"></div>
  </div>

  <!-- ══ PROVEEDOR ══ -->
  <div id="proveedor" class="view">
    <div class="fecha-filter">
      <label style="margin:0">FILTRAR POR FECHA DE ENTREGA</label>
      <div class="fecha-filter-row">
        <input type="date" id="fechaFiltroP">
        <button class="clear-btn" id="clearFechaP">✕ Limpiar</button>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtnP">↻ Actualizar</button>
    <div id="proveedorResumen"></div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIqpDQvGr7pstVMRWJt-yPIvRfy5EqGQRWSV9oJBTPzrSzeP3Fzbkt5RS2od0Sl949/exec";

// HIST_COSTO_*, CAJAS_POR_BOTE, costoVigente, isBerry, precioBaseUnidad,
// cantidadAKg, parseSufijoUnidad provienen de config.js

function emojiDeFruta(nombre) {
  var c = CATALOGO.find(function(x){ return x.nombre === nombre; });
  return (c && c.emoji) || "🫐";
}

var resumenData = [];
var proveedorData = [];
var kpiData = [];
var expandido = null;
var periodoAgrupacion = "semana"; // "semana" | "mes" — para la gráfica de Tablero
var casasExpandido = false; // ver top 5 vs. lista completa en "VENTAS POR CASA"

document.getElementById("tabTablero").addEventListener("click",  function(){ switchTab("tablero"); });
document.getElementById("tabResumen").addEventListener("click",  function(){ switchTab("resumen"); });
document.getElementById("tabProveedor").addEventListener("click", function(){ switchTab("proveedor"); });

document.getElementById("refreshBtnK").addEventListener("click", cargarTablero);
document.getElementById("kpiDesde").addEventListener("change", renderTablero);
document.getElementById("kpiHasta").addEventListener("change", renderTablero);
document.getElementById("clearKpiRango").addEventListener("click", function(){
  document.getElementById("kpiDesde").value = "";
  document.getElementById("kpiHasta").value = "";
  renderTablero();
});

document.getElementById("refreshBtn").addEventListener("click", cargarResumen);
document.getElementById("fechaFiltro").addEventListener("change", renderResumen);
document.getElementById("clearFecha").addEventListener("click", function(){
  document.getElementById("fechaFiltro").value=""; renderResumen();
});
document.getElementById("refreshBtnP").addEventListener("click", cargarProveedor);
document.getElementById("fechaFiltroP").addEventListener("change", renderProveedor);
document.getElementById("clearFechaP").addEventListener("click", function(){
  document.getElementById("fechaFiltroP").value=""; renderProveedor();
});

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
  document.querySelectorAll(".view").forEach(function(v){ v.classList.remove("active"); });
  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
  document.getElementById(tab).classList.add("active");
  if (tab==="tablero")   cargarTablero();
  if (tab==="resumen")   cargarResumen();
  if (tab==="proveedor") cargarProveedor();
}

function fmtFecha(f) {
  if (!f) return "Sin fecha";
  if (typeof f==="string"&&f.includes("T")) f=f.split("T")[0];
  return f;
}

// Devuelve la lista de fechas válidas (YYYY-MM-DD) presentes en un dataset, ordenadas asc.
function fechasValidas(datos) {
  var set = {};
  datos.forEach(function(r){ var f=fmtFecha(r[6]); if (f && f!=="Sin fecha") set[f]=true; });
  return Object.keys(set).sort();
}

// ═══════════════════════════════════════════
// TABLERO — KPIs agregados
// ═══════════════════════════════════════════
async function cargarTablero() {
  document.getElementById("kpiContent").innerHTML="<p style='text-align:center;color:#6b9e6b;padding:30px'>⏳ Cargando datos...</p>";
  try {
    var res=await fetch(SCRIPT_URL+"?action=read");
    var data=await res.json();
    kpiData=(data.rows||[]).slice(1).filter(function(r){return r[0]&&r[2];});
    renderTablero();
  } catch(e) {
    document.getElementById("kpiContent").innerHTML="<p style='color:#ff8a80;text-align:center;padding:20px'>"+e.message+"</p>";
  }
}

/**
 * Ventas totales agrupadas por dirección de entrega (columna "Dirección" en
 * Sheets), de mayor a menor. Los pedidos sin dirección capturada se agrupan
 * bajo "Sin dirección" — no se descartan silenciosamente, pero conviene saber
 * que hoy la mayoría de los pedidos viejos de Azaleas no tienen ese campo
 * lleno (el número de casa históricamente vivía en el nombre del cliente).
 */
function calcularVentasPorCasa(datos) {
  var porCasa = {};
  datos.forEach(function(r){
    var casa = (r[11] || "").trim() || "Sin dirección";
    porCasa[casa] = (porCasa[casa] || 0) + (parseFloat(r[4]) || 0);
  });
  return Object.entries(porCasa).sort(function(a,b){ return b[1]-a[1]; });
}

/**
 * Calcula KPIs globales agrupando por fecha de entrega (cada fecha = un pedido
 * al proveedor, así que el redondeo a botes se hace por fecha y luego se suma —
 * esto refleja lo que realmente se paga, no un promedio teórico).
 */
function calcularKPIsGlobal(datos) {
  var porFecha = {};
  datos.forEach(function(r){
    var f = fmtFecha(r[6]);
    if (!porFecha[f]) porFecha[f] = [];
    porFecha[f].push(r);
  });

  var ventasTotales = 0, pagoProveedorTotal = 0;
  Object.keys(porFecha).forEach(function(f){
    var c = calcularCompraProveedor(porFecha[f], f);
    ventasTotales += c.ventaTotal;
    pagoProveedorTotal += c.costoTotalProveedor;
  });

  var productosVendidos = datos.reduce(function(s,r){ return s+(parseFloat(r[1])||0); },0);
  // Desglose por presentación — sumar botes con botes, clamshells con clamshells, etc.
  // en vez de un solo total que mezcla unidades sin sentido (kg + piezas + botes...).
  var porPresentacion = {};
  datos.forEach(function(r){
    filasVenta(r).forEach(function(f){
      porPresentacion[f.presentacion] = (porPresentacion[f.presentacion] || 0) + f.cantidad;
    });
  });
  var clientesSet = {};
  var porUbicacion = {};
  datos.forEach(function(r){
    clientesSet[r[2]] = true;
    var u = r[10] || "Sin ubicación";
    porUbicacion[u] = (porUbicacion[u]||0) + (parseFloat(r[4])||0);
  });

  return {
    ventasTotales: ventasTotales,
    pagoProveedorTotal: pagoProveedorTotal,
    utilidadNeta: ventasTotales - pagoProveedorTotal,
    productosVendidos: productosVendidos,
    porPresentacion: porPresentacion,
    numClientes: Object.keys(clientesSet).length,
    numPedidos: datos.length,
    numFechas: Object.keys(porFecha).length,
    porUbicacion: porUbicacion
  };
}

/**
 * Tabla de ventas por fruta/producto: una fila por combinación
 * (fruta, nombre comercial, presentación), con cantidad e importe vendido
 * sumados. Cubre todo el catálogo — a diferencia de calcularVentasPorFruta,
 * aquí "cantidad" e "importe" son siempre los de la línea de pedido tal cual
 * se vendió (sin conversión a cajas/botes), para que se pueda leer como
 * reporte de ventas y no de compra a proveedor.
 */
// Blueberry/Frambuesa/Zarzamora vendidas directas (no dentro de Ludo Select/Pack/Mix)
// siempre son bote, nunca clamshell — así se etiquetan en la tabla de ventas.
var NOMBRE_BOTE_DIRECTO = { "Blueberry":"Bote Blueberry", "Frambuesa":"Bote Frambuesa", "Zarzamora":"Bote Zarzamora" };
// Elote amarillo y Elote Select son el mismo producto (varió el nombre con el tiempo);
// todos los elotes (amarillo y blanco) se venden en charola, no por pieza suelta.
var ELOTE_NOMBRE_COMERCIAL = { "Elote amarillo":"Elote Select", "Elote Select":"Elote Select", "Elote blanco":"Elote blanco" };

/**
 * Extrae de una fila de Sheets un arreglo de {fruta, nombreComercial, presentacion,
 * cantidad, importe, mes} — un elemento por cada fruta involucrada. "cantidad" es
 * la cantidad real de esa presentación por fruta (ej. Ludo Pack = 3 clamshells de
 * la fruta elegida por cada unidad vendida; Familiar 2x = 1 bote de cada una de
 * las 2 frutas elegidas). "importe" se reparte entre las frutas de una misma venta
 * para que la suma total no se duplique. Es el punto único de clasificación
 * reutilizado por la tabla de detalle y por el resumen mensual.
 */
function filasVenta(r) {
  var nombreRaw = r[0] || "";
  var qty = parseFloat(r[1]) || 1;
  var precioU = parseFloat(r[3]) || 0;
  var fecha = fmtFecha(r[6]);
  var mes = (fecha !== "Sin fecha") ? fecha.slice(0,7) : "Sin fecha";
  var importeTotal = precioU * qty;
  var p = parsearProducto(nombreRaw, qty);

  if (!p.tipo) {
    return [{ fruta:"(sin categoría)", nombreComercial:nombreRaw, presentacion:"—", cantidad:qty, importe:importeTotal, mes:mes }];
  }
  if (p.tipo === "elote") {
    var en = p.frutas[0];
    return [{ fruta: ELOTE_FRUTA[en] || en, nombreComercial: ELOTE_NOMBRE_COMERCIAL[en] || en, presentacion:"charola", cantidad:qty, importe:importeTotal, mes:mes }];
  }
  if (p.tipo === "pieza_directa") {
    var pn = p.frutas[0];
    return [{ fruta:pn, nombreComercial:pn, presentacion:"pieza", cantidad:qty, importe:importeTotal, mes:mes }];
  }
  if (p.tipo === "mercado_kg") {
    var mn = p.frutas[0];
    var suf = parseSufijoUnidad(nombreRaw);
    var unidadLbl = suf.unidad === "gramos" ? "gramos" : suf.unidad === "pieza" ? "pieza" : "kg";
    return [{ fruta:mn, nombreComercial:mn, presentacion:unidadLbl, cantidad:qty, importe:importeTotal, mes:mes }];
  }
  if (p.tipo === "fruta_suelta") {
    var fn = p.frutas[0];
    var multFS = p.mult || 1;
    if (NOMBRE_BOTE_DIRECTO[fn]) {
      return [{ fruta:fn, nombreComercial:NOMBRE_BOTE_DIRECTO[fn], presentacion:"bote", cantidad:qty*multFS, importe:importeTotal, mes:mes }];
    }
    var presFS = fn === "Cereza" ? "bote" : "clamshell";
    return [{ fruta:fn, nombreComercial:nombreRaw, presentacion:presFS, cantidad:qty*multFS, importe:importeTotal, mes:mes }];
  }
  if (p.tipo === "clamshell") {
    var nomC = nombreRaw.split("·")[0].trim();
    var multC = p.mult || 1;
    var frutasC = p.frutas.filter(Boolean);
    if (!frutasC.length) return [{ fruta:"(sin fruta)", nombreComercial:nomC, presentacion:"clamshell", cantidad:qty*multC, importe:importeTotal, mes:mes }];
    var importeC = importeTotal / frutasC.length;
    return frutasC.map(function(fn){
      return { fruta:fn, nombreComercial:nomC, presentacion:"clamshell", cantidad:qty*multC, importe:importeC, mes:mes };
    });
  }
  if (p.tipo === "familiar") {
    var nomF = nombreRaw.split("·")[0].trim();
    var frutasF = p.frutas.filter(Boolean);
    if (!frutasF.length) return [{ fruta:"(sin fruta)", nombreComercial:nomF, presentacion:"bote", cantidad:qty, importe:importeTotal, mes:mes }];
    var importeF = importeTotal / frutasF.length;
    return frutasF.map(function(fn){
      return { fruta:fn, nombreComercial:nomF, presentacion:"bote", cantidad:qty, importe:importeF, mes:mes };
    });
  }
  return [{ fruta:"(sin categoría)", nombreComercial:nombreRaw, presentacion:"—", cantidad:qty, importe:importeTotal, mes:mes }];
}

function calcularTablaVentas(datos) {
  var filas = {}; // key "fruta||nombreComercial||presentacion" -> {fruta,nombreComercial,presentacion,cantidad,importe}
  datos.forEach(function(r) {
    filasVenta(r).forEach(function(f){
      var key = f.fruta + "||" + f.nombreComercial + "||" + f.presentacion;
      if (!filas[key]) filas[key] = { fruta:f.fruta, nombreComercial:f.nombreComercial, presentacion:f.presentacion, cantidad:0, importe:0 };
      filas[key].cantidad += f.cantidad;
      filas[key].importe += f.importe;
    });
  });
  return Object.values(filas).sort(function(a,b){
    return a.fruta === b.fruta ? a.nombreComercial.localeCompare(b.nombreComercial) : a.fruta.localeCompare(b.fruta);
  });
}

/**
 * Matriz fruta × mes con el importe vendido de cada fruta en cada mes.
 * Regresa { frutas:[...ordenadas por total desc], meses:[...ordenados asc],
 *           datos: { fruta: { mes: importe } }, totalesFruta: { fruta: total } }
 */
function calcularVentasPorMes(datos) {
  var celdas = {}; // "fruta||mes" -> importe
  var totalesFruta = {};
  var mesesSet = {};
  datos.forEach(function(r) {
    filasVenta(r).forEach(function(f){
      var key = f.fruta + "||" + f.mes;
      celdas[key] = (celdas[key] || 0) + f.importe;
      totalesFruta[f.fruta] = (totalesFruta[f.fruta] || 0) + f.importe;
      mesesSet[f.mes] = true;
    });
  });
  var frutas = Object.keys(totalesFruta).sort(function(a,b){ return totalesFruta[b] - totalesFruta[a]; });
  var meses = Object.keys(mesesSet).filter(function(m){ return m !== "Sin fecha"; }).sort();
  var datosMatriz = {};
  frutas.forEach(function(fr){
    datosMatriz[fr] = {};
    meses.forEach(function(m){ datosMatriz[fr][m] = celdas[fr+"||"+m] || 0; });
  });
  return { frutas:frutas, meses:meses, datos:datosMatriz, totalesFruta:totalesFruta };
}

// Devuelve la fecha (YYYY-MM-DD) del lunes de la semana que contiene `fecha`.
function claveSemana(fecha) {
  var d = new Date(fecha + "T00:00:00");
  var dow = d.getDay(); // 0=domingo .. 6=sábado
  var diffALunes = (dow === 0) ? -6 : (1 - dow);
  d.setDate(d.getDate() + diffALunes);
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, "0");
  var day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}

function fmtPeriodoLabel(key, agrupacion) {
  var meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  var partes = key.split("-");
  if (agrupacion === "mes") return meses[parseInt(partes[1],10)-1] + " " + partes[0].slice(2);
  return partes[2] + " " + meses[parseInt(partes[1],10)-1]; // semana: día del lunes + mes
}

/**
 * Venta, costo a proveedor y utilidad agrupados por semana o por mes.
 * El costo se calcula agrupando primero por fecha exacta de entrega (igual que
 * calcularKPIsGlobal) para que el redondeo a botes refleje lo que realmente se
 * pagó cada día, y luego se suman esos totales diarios dentro de cada periodo
 * — no se recalculan cajas pooled a nivel semana/mes, porque el proveedor se
 * compra por fecha de entrega, no por semana.
 */
function calcularVentasPorPeriodo(datos, agrupacion) {
  var porFecha = {};
  datos.forEach(function(r) {
    var f = fmtFecha(r[6]);
    if (f === "Sin fecha") return;
    if (!porFecha[f]) porFecha[f] = [];
    porFecha[f].push(r);
  });
  var porPeriodo = {};
  Object.keys(porFecha).forEach(function(f) {
    var c = calcularCompraProveedor(porFecha[f], f);
    var key = agrupacion === "mes" ? f.slice(0, 7) : claveSemana(f);
    if (!porPeriodo[key]) porPeriodo[key] = { venta: 0, costo: 0 };
    porPeriodo[key].venta += c.ventaTotal;
    porPeriodo[key].costo += c.costoTotalProveedor;
  });
  return Object.keys(porPeriodo).sort().map(function(k) {
    var p = porPeriodo[k];
    return { key: k, label: fmtPeriodoLabel(k, agrupacion), venta: p.venta, costo: p.costo, utilidad: p.venta - p.costo };
  });
}

function kpiCard(label, val, cls) {
  return '<div class="kpi-card"><div class="kpi-label">'+label+'</div><div class="kpi-val '+(cls||'')+'">'+val+'</div></div>';
}
function kpiMini(label, val) {
  return '<div class="kpi-mini"><div class="kpi-mini-label">'+label+'</div><div class="kpi-mini-val">'+val+'</div></div>';
}
// Tarjeta KPI que desglosa una cantidad por presentación (bote/clamshell/charola/kg/pieza)
// en vez de sumarlas todas juntas sin sentido.
function kpiCardPresentacion(label, porPresentacion) {
  var items = Object.keys(porPresentacion).sort(function(a,b){ return porPresentacion[b]-porPresentacion[a]; });
  var body = items.map(function(p){
    var v = Math.round(porPresentacion[p]*100)/100;
    return '<div style="font-size:15px;font-weight:bold;color:#e8f5e8;line-height:1.6">'+v+' <span style="font-size:11px;color:#6b9e6b;font-weight:normal">'+p+'</span></div>';
  }).join("");
  return '<div class="kpi-card"><div class="kpi-label">'+label+'</div>'+(body||'<div class="kpi-val">0</div>')+'</div>';
}

function renderTablero() {
  var desde = document.getElementById("kpiDesde").value;
  var hasta = document.getElementById("kpiHasta").value;
  var container = document.getElementById("kpiContent");

  var datos = kpiData.filter(function(r){
    var f = fmtFecha(r[6]);
    if (f === "Sin fecha") return false;
    if (desde && f < desde) return false;
    if (hasta && f > hasta) return false;
    return true;
  });

  if (datos.length === 0) {
    container.innerHTML = "<p style='text-align:center;color:#5a8a5a;padding:40px'>No hay pedidos en este rango</p>";
    return;
  }

  var k = calcularKPIsGlobal(datos);
  var rangoLabel = (desde||hasta) ? ((desde||"inicio")+" → "+(hasta||"hoy")) : "TODO EL HISTORIAL · "+k.numFechas+" fecha"+(k.numFechas!==1?"s":"")+" con entrega";

  var html = "";
  html += '<p class="kpi-rango">'+rangoLabel+'</p>';

  html += '<div class="kpi-grid">';
  html += kpiCard("VENTAS TOTALES", "$"+k.ventasTotales.toFixed(0));
  html += kpiCard("PAGO A PROVEEDOR", "$"+k.pagoProveedorTotal.toFixed(0), "naranja");
  html += kpiCard("UTILIDAD NETA", "$"+k.utilidadNeta.toFixed(0), k.utilidadNeta<0 ? "rojo" : "");
  html += kpiCardPresentacion("PRODUCTOS VENDIDOS", k.porPresentacion);
  html += '</div>';

  html += '<div class="kpi-mini-row">';
  html += kpiMini("PEDIDOS", k.numPedidos);
  html += kpiMini("CLIENTES", k.numClientes);
  html += kpiMini("DÍAS C/ENTREGA", k.numFechas);
  html += '</div>';

  html += renderGraficaVentas(datos);

  var ubis = Object.entries(k.porUbicacion).sort(function(a,b){ return b[1]-a[1]; });
  if (ubis.length) {
    var max = Math.max.apply(null, ubis.map(function(u){ return u[1]; }));
    html += '<div class="kpi-block"><div class="kpi-block-title">VENTAS POR UBICACIÓN</div>';
    ubis.forEach(function(u){
      var pct = max>0 ? Math.round(u[1]/max*100) : 0;
      html += '<div class="cliente-bar-row">'+
        '<span class="cliente-bar-name">'+u[0]+'</span>'+
        '<div class="cliente-bar-track"><div class="cliente-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="cliente-bar-grams">$'+u[1].toFixed(0)+'</span>'+
      '</div>';
    });
    html += '</div>';
  }

  // ── Ventas por casa (dirección de entrega) — top 5 con opción de desplegar ──
  var casas = calcularVentasPorCasa(datos);
  if (casas.length) {
    var maxCasa = Math.max.apply(null, casas.map(function(c){ return c[1]; }));
    var casasAMostrar = casasExpandido ? casas : casas.slice(0, 5);
    html += '<div class="kpi-block"><div class="kpi-block-title" style="display:flex;justify-content:space-between;align-items:center">'+
      '<span>VENTAS POR CASA</span>'+
      (casas.length > 5 ? '<button class="periodo-btn" id="toggleCasas">'+(casasExpandido ? 'Ver menos' : 'Ver todas ('+casas.length+')')+'</button>' : '')+
    '</div>';
    casasAMostrar.forEach(function(c){
      var pct = maxCasa>0 ? Math.round(c[1]/maxCasa*100) : 0;
      html += '<div class="cliente-bar-row">'+
        '<span class="cliente-bar-name">'+c[0]+'</span>'+
        '<div class="cliente-bar-track"><div class="cliente-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="cliente-bar-grams">$'+c[1].toFixed(0)+'</span>'+
      '</div>';
    });
    html += '</div>';
  }

  // ── Detalle de ventas por producto (fruta · nombre comercial · presentación) ──
  var tabla = calcularTablaVentas(datos);
  if (tabla.length) {
    var totalImporte = tabla.reduce(function(s,f){ return s+f.importe; },0);
    html += '<div class="kpi-block"><div class="kpi-block-title">DETALLE DE VENTAS POR PRODUCTO</div>';
    html += '<table class="cliente-table"><thead><tr>'+
      '<th>FRUTA</th><th>NOMBRE COMERCIAL</th><th>PRESENTACIÓN</th><th style="text-align:right">CANT.</th><th>IMPORTE</th>'+
    '</tr></thead><tbody>';
    tabla.forEach(function(f, i){
      html += '<tr class="cliente-row" style="cursor:default">'+
        '<td>'+f.fruta+'</td>'+
        '<td>'+f.nombreComercial+'</td>'+
        '<td style="color:#6b9e6b">'+f.presentacion+'</td>'+
        '<td style="text-align:right">'+(Math.round(f.cantidad*100)/100)+'</td>'+
        '<td>$'+f.importe.toFixed(0)+'</td>'+
      '</tr>';
      var esFinDeGrupo = (i === tabla.length-1) || (tabla[i+1].fruta !== f.fruta);
      if (esFinDeGrupo) {
        var grupo = tabla.filter(function(x){ return x.fruta === f.fruta; });
        var subCant = grupo.reduce(function(s,x){ return s+x.cantidad; },0);
        var subImp  = grupo.reduce(function(s,x){ return s+x.importe; },0);
        html += '<tr class="detail-row" style="background:rgba(76,175,80,0.08)">'+
          '<td colspan="3" style="font-weight:bold;color:#a8e6a3">Subtotal '+f.fruta+'</td>'+
          '<td style="text-align:right;font-weight:bold;color:#a8e6a3">'+(Math.round(subCant*100)/100)+'</td>'+
          '<td style="font-weight:bold;color:#a8e6a3">$'+subImp.toFixed(0)+'</td>'+
        '</tr>';
      }
    });
    html += '<tr class="total-row"><td colspan="4">TOTAL</td><td>$'+totalImporte.toFixed(0)+'</td></tr>';
    html += '</tbody></table></div>';
  }

  // ── Ventas por mes y fruta (tabla gráfica tipo mapa de calor) ──
  var pm = calcularVentasPorMes(datos);
  if (pm.frutas.length && pm.meses.length) {
    var maxCelda = 0;
    pm.frutas.forEach(function(fr){ pm.meses.forEach(function(m){ maxCelda = Math.max(maxCelda, pm.datos[fr][m]); }); });
    html += '<div class="kpi-block"><div class="kpi-block-title">VENTAS POR MES Y FRUTA</div>';
    html += '<div style="overflow-x:auto"><table class="cliente-table" style="white-space:nowrap">';
    html += '<thead><tr><th>FRUTA</th>';
    pm.meses.forEach(function(m){ html += '<th style="text-align:right">'+fmtMesLabel(m)+'</th>'; });
    html += '<th style="text-align:right">TOTAL</th></tr></thead><tbody>';
    pm.frutas.forEach(function(fr){
      html += '<tr class="cliente-row" style="cursor:default"><td>'+fr+'</td>';
      pm.meses.forEach(function(m){
        var v = pm.datos[fr][m];
        var pct = maxCelda>0 ? v/maxCelda*100 : 0;
        var bg = v>0 ? 'rgba(76,175,80,'+(0.08+0.35*pct/100).toFixed(2)+')' : 'transparent';
        html += '<td style="text-align:right;background:'+bg+'">'+(v>0?'$'+v.toFixed(0):'—')+'</td>';
      });
      html += '<td style="text-align:right;font-weight:bold;color:#a8e6a3">$'+pm.totalesFruta[fr].toFixed(0)+'</td></tr>';
    });
    var totalGeneral = 0;
    html += '<tr class="total-row"><td>TOTAL</td>';
    pm.meses.forEach(function(m){
      var totalMes = pm.frutas.reduce(function(s,fr){ return s+pm.datos[fr][m]; },0);
      totalGeneral += totalMes;
      html += '<td style="text-align:right">$'+totalMes.toFixed(0)+'</td>';
    });
    html += '<td style="text-align:right">$'+totalGeneral.toFixed(0)+'</td></tr>';
    html += '</tbody></table></div></div>';
  }

  container.innerHTML = html;
  container.querySelectorAll(".periodo-btn").forEach(function(btn){
    if (!btn.dataset.periodo) return; // el botón "Ver todas/Ver menos" de casas reusa esta clase solo por estilo
    btn.addEventListener("click", function(){
      periodoAgrupacion = this.dataset.periodo;
      renderTablero();
    });
  });
  var toggleCasasBtn = document.getElementById("toggleCasas");
  if (toggleCasasBtn) toggleCasasBtn.addEventListener("click", function(){
    casasExpandido = !casasExpandido;
    renderTablero();
  });
}

function fmtMesLabel(m) {
  var partes = m.split("-");
  var meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return meses[parseInt(partes[1],10)-1] + " " + partes[0].slice(2);
}

/**
 * Gráfica de barras: por cada semana/mes, el costo a proveedor (naranja) y la
 * utilidad (verde) apilados — la altura total de la barra es la venta, así
 * se ve de un vistazo cuánto de lo vendido fue costo y cuánto fue ganancia.
 * Si un periodo dio pérdida (utilidad<0), la venta no alcanza a cubrir el
 * costo: la barra muestra el costo completo en naranja con un remate rojo
 * arriba marcando la parte del costo que no se recuperó con ventas.
 */
function renderGraficaVentas(datos) {
  var periodos = calcularVentasPorPeriodo(datos, periodoAgrupacion);
  if (!periodos.length) return "";

  var chartH = 150, barW = 26, gap = 16, padTop = 26, padBottom = 30, padSide = 10;
  var maxVal = Math.max.apply(null, periodos.map(function(p){ return Math.max(p.costo, p.venta); }));
  if (maxVal <= 0) maxVal = 1;
  var svgW = padSide * 2 + periodos.length * (barW + gap) - gap;
  var svgH = padTop + chartH + padBottom;
  var mostrarLabels = periodos.length <= 12;
  var baseY = padTop + chartH;

  var bars = periodos.map(function(p, i) {
    var x = padSide + i * (barW + gap);
    var costoH = (p.costo / maxVal) * chartH;
    var ventaH = (p.venta / maxVal) * chartH;
    var esPerdida = p.utilidad < 0;
    var rects = '<rect x="'+x+'" y="'+(baseY-costoH)+'" width="'+barW+'" height="'+costoH+'" fill="#ffb74d"/>';
    if (!esPerdida) {
      var utilH = ventaH - costoH;
      if (utilH > 0.5) rects += '<rect x="'+x+'" y="'+(baseY-ventaH)+'" width="'+barW+'" height="'+utilH+'" fill="#a8e6a3"/>';
    } else {
      var capH = costoH - ventaH;
      if (capH > 0.5) rects += '<rect x="'+x+'" y="'+(baseY-costoH)+'" width="'+barW+'" height="'+capH+'" fill="#ff7070"/>';
    }
    var topY = baseY - Math.max(costoH, ventaH);
    var label = mostrarLabels
      ? '<text x="'+(x+barW/2)+'" y="'+(topY-6)+'" text-anchor="middle" font-size="10" font-weight="bold" fill="'+(esPerdida?'#ff7070':'#a8e6a3')+'">'+(p.utilidad>=0?'+':'−')+'$'+Math.round(Math.abs(p.utilidad))+'</text>'
      : '';
    var xLabel = '<text x="'+(x+barW/2)+'" y="'+(baseY+16)+'" text-anchor="middle" font-size="10" fill="#6b9e6b">'+p.label+'</text>';
    var titulo = '<title>'+p.label+' — Venta $'+p.venta.toFixed(0)+' · Costo $'+p.costo.toFixed(0)+' · Utilidad $'+p.utilidad.toFixed(0)+'</title>';
    return '<g>'+titulo+rects+label+xLabel+'</g>';
  }).join("");

  var baseline = '<line x1="0" y1="'+baseY+'" x2="'+svgW+'" y2="'+baseY+'" stroke="rgba(168,230,163,0.2)" stroke-width="1"/>';

  return '<div class="kpi-block">'+
    '<div class="kpi-block-title" style="display:flex;justify-content:space-between;align-items:center">'+
      '<span>VENTAS Y UTILIDAD POR PERIODO</span>'+
      '<div class="periodo-toggle">'+
        '<button class="periodo-btn'+(periodoAgrupacion==="semana"?" active":"")+'" data-periodo="semana">Semana</button>'+
        '<button class="periodo-btn'+(periodoAgrupacion==="mes"?" active":"")+'" data-periodo="mes">Mes</button>'+
      '</div>'+
    '</div>'+
    '<div class="grafica-leyenda">'+
      '<span class="leyenda-item"><span class="leyenda-swatch" style="background:#ffb74d"></span>Costo</span>'+
      '<span class="leyenda-item"><span class="leyenda-swatch" style="background:#a8e6a3"></span>Utilidad</span>'+
      '<span class="leyenda-item"><span class="leyenda-swatch" style="background:#ff7070"></span>Pérdida (costo no cubierto)</span>'+
    '</div>'+
    '<div style="overflow-x:auto">'+
      '<svg width="'+svgW+'" height="'+svgH+'" viewBox="0 0 '+svgW+' '+svgH+'" style="display:block">'+baseline+bars+'</svg>'+
    '</div>'+
  '</div>';
}

async function cargarResumen() {
  document.getElementById("resumenCards").innerHTML="<p style='text-align:center;color:#6b9e6b;padding:30px'>⏳ Cargando pedidos...</p>";
  try {
    var res=await fetch(SCRIPT_URL+"?action=read");
    var data=await res.json();
    resumenData=(data.rows||[]).slice(1).filter(function(r){return r[0]&&r[2];});
    var input=document.getElementById("fechaFiltro");
    if (!input.value) {
      var fechas=fechasValidas(resumenData);
      if (fechas.length) input.value=fechas[fechas.length-1]; // fecha más reciente con pedidos
    }
    renderResumen();
  } catch(e) {
    document.getElementById("resumenCards").innerHTML="<p style='color:#ff8a80;text-align:center;padding:20px'>"+e.message+"</p>";
  }
}

function renderResumen() {
  var filtro=document.getElementById("fechaFiltro").value;
  if (!filtro) {
    document.getElementById("resumenCards").innerHTML="<p style='text-align:center;color:#5a8a5a;padding:40px'>📅 Selecciona una fecha para ver los pedidos</p>";
    document.getElementById("granTotal").textContent="—";
    document.getElementById("numClientes").textContent="—";
    document.getElementById("numRegistros").textContent="—";
    return;
  }
  var datos=resumenData.filter(function(r){return fmtFecha(r[6])===filtro;});
  var byCliente={};
  datos.forEach(function(r){
    var c=r[2]||"?"; var t=parseFloat(r[4])||0;
    if(!byCliente[c]) byCliente[c]={total:0,items:[],ubicacion:r[10]||"",direccion:r[11]||"",horaEntrega:r[12]||"",pagado:true};
    byCliente[c].total+=t;
    byCliente[c].items.push({producto:r[0],cantidad:r[1],total:t,fecha:fmtFecha(r[6])});
    if ((r[5]||"").trim().toLowerCase() !== "pagado") byCliente[c].pagado = false;
  });
  var granTotal=datos.reduce(function(s,r){return s+(parseFloat(r[4])||0);},0);
  document.getElementById("granTotalLabel").textContent=filtro?"TOTAL · "+filtro:"TOTAL GENERAL";
  document.getElementById("granTotal").textContent="$"+granTotal.toFixed(0);
  document.getElementById("numClientes").textContent=Object.keys(byCliente).length+" clientes";
  document.getElementById("numRegistros").textContent=datos.length+" registros";
  var container=document.getElementById("resumenCards");
  container.innerHTML="";
  if(datos.length===0){container.innerHTML="<p style='text-align:center;color:#5a8a5a;padding:40px'>No hay pedidos para esta fecha</p>";return;}
  var sorted=Object.entries(byCliente).sort(function(a,b){return b[1].total-a[1].total;});
  var table=document.createElement("table"); table.className="cliente-table";
  table.innerHTML='<thead><tr><th>CLIENTE</th><th></th><th>TOTAL</th></tr></thead>';
  var tbody=document.createElement("tbody");
  sorted.forEach(function(entry){
    var nombre=entry[0],info=entry[1],isOpen=expandido===nombre;
    var tr=document.createElement("tr"); tr.className="cliente-row";
    var ubiTag=info.ubicacion?'<span style="font-size:11px;color:#5a8a5a"> 📍'+info.ubicacion+'</span>':'';
    var direccionTag=info.direccion?'<div class="cliente-sub">🏠 '+info.direccion+'</div>':'';
    var horaTag=info.horaEntrega?'<span style="font-size:11px;color:#5a8a5a"> · 🕐 '+info.horaEntrega+'</span>':'';
    var pagadoTag=info.pagado
      ? '<span class="pagado-pill pagado-si" data-cliente="'+nombre.replace(/"/g,"&quot;")+'" data-estado="pagado">✅ Pagado</span>'
      : '<span class="pagado-pill pagado-no" data-cliente="'+nombre.replace(/"/g,"&quot;")+'" data-estado="pendiente">⏳ Pendiente</span>';
    tr.innerHTML=
      '<td><div class="cliente-name">'+nombre+ubiTag+horaTag+'</div>'+direccionTag+'<div class="cliente-sub">'+info.items.length+' producto'+(info.items.length!==1?"s":"")+'</div></td>'+
      '<td style="color:#6b9e6b;font-size:13px">'+(isOpen?"▲":"▼")+'</td>'+
      '<td>$'+info.total.toFixed(0)+'<div style="margin-top:4px">'+pagadoTag+'</div></td>';
    tr.addEventListener("click",function(){expandido=(expandido===nombre)?null:nombre;renderResumen();});
    tbody.appendChild(tr);
    if(isOpen){
      info.items.forEach(function(it){
        var dtr=document.createElement("tr"); dtr.className="detail-row";
        dtr.innerHTML='<td style="color:#a8e6a3">'+it.cantidad+'× '+it.producto+'</td><td style="color:#5a8a5a;font-size:12px">'+it.fecha+'</td><td>$'+it.total.toFixed(0)+'</td>';
        tbody.appendChild(dtr);
      });
    }
  });
  var ttr=document.createElement("tr"); ttr.className="total-row";
  ttr.innerHTML='<td colspan="2">TOTAL '+(filtro||"GENERAL")+'</td><td>$'+granTotal.toFixed(0)+'</td>';
  tbody.appendChild(ttr);
  table.appendChild(tbody);
  container.appendChild(table);
  container.querySelectorAll(".pagado-pill").forEach(function(el){
    el.addEventListener("click", function(ev){
      ev.stopPropagation(); // no togglear la fila (expandir/colapsar) al tocar el badge
      var cliente = this.dataset.cliente;
      var nuevoEstado = this.dataset.estado === "pagado" ? "pendiente" : "pagado";
      togglePagado(cliente, filtro, nuevoEstado);
    });
  });
}

/**
 * Marca como Pagado/Pendiente (columna F en Sheets) todas las filas de un
 * cliente en una fecha de entrega. Actualiza la vista local de inmediato
 * (optimista) y manda el cambio al Apps Script en segundo plano — mismo
 * patrón fire-and-forget que usa index.html al guardar un pedido nuevo,
 * porque el fetch va con mode:"no-cors" y no se puede leer la respuesta.
 */
function togglePagado(cliente, fecha, nuevoEstado) {
  var nuevoTexto = nuevoEstado === "pagado" ? "Pagado" : "Pendiente";
  resumenData.forEach(function(r){
    if ((r[2]||"").trim() === cliente && fmtFecha(r[6]) === fecha) r[5] = nuevoTexto;
  });
  renderResumen();
  fetch(SCRIPT_URL+"?action=marcarPagado&cliente="+encodeURIComponent(cliente)+"&fecha="+encodeURIComponent(fecha)+"&estado="+nuevoEstado, {mode:"no-cors"});
}

async function cargarProveedor() {
  document.getElementById("proveedorResumen").innerHTML="<p style='text-align:center;color:#6b9e6b;padding:30px'>⏳ Cargando pedidos...</p>";
  try {
    var res=await fetch(SCRIPT_URL+"?action=read");
    var data=await res.json();
    proveedorData=(data.rows||[]).slice(1).filter(function(r){return r[0]&&r[2];});
    var input=document.getElementById("fechaFiltroP");
    if (!input.value) {
      var fechas=fechasValidas(proveedorData);
      if (fechas.length) input.value=fechas[fechas.length-1]; // fecha más reciente con pedidos
    }
    renderProveedor();
  } catch(e) {
    document.getElementById("proveedorResumen").innerHTML="<p style='color:#ff8a80;text-align:center;padding:20px'>"+e.message+"</p>";
  }
}

/**
 * Parsea el nombre del producto guardado en Sheets para extraer tipo y frutas.
 * Ejemplos:
 *   "Individual (clamshell) 1x · Zarzamora"
 *   "Individual (clamshell) 2x · Zarzamora + Blueberry"
 *   "Familiar (bote) 2x · Frambuesa + Blueberry"
 *   "Zarzamora"
 *   "Elote amarillo"
 */
function parsearProducto(nombreRaw, cantidad) {
  var qty = parseFloat(cantidad) || 1;
  var tipo = null; // "clamshell" | "familiar" | "fruta_suelta" | "elote" | "pieza_directa" | "mercado_kg"
  var frutas = [];
  var mult = 1; // cajas (clamshells) representadas por cada unidad pedida
  var kgEquivalente = 0;

  if (nombreRaw.indexOf("Ludo Berry Max") !== -1) {
    // Ludo Berry Max = Fresa + Ludo Berry Mix: 1 clamshell de Fresa (implícito, no es slot)
    // + 1 clamshell de cada una de las 3 frutas elegidas.
    tipo = "clamshell";
    var partesMax = nombreRaw.split("·");
    frutas = ["Fresa"];
    if (partesMax.length > 1) {
      frutas = frutas.concat(partesMax[1].trim().split("+").map(function(f){ return normalizarFruta(f.trim()); }));
    }
  } else if (nombreRaw.indexOf("Ludo Pack") !== -1 || nombreRaw.indexOf("Ludo Berry 3-Pack") !== -1 || nombreRaw.indexOf("Ludo Tomatizado") !== -1 || nombreRaw.indexOf("Cherry 3-Pack") !== -1) {
    // Ludo Pack/Ludo Berry 3-Pack/Ludo Tomatizado/Cherry 3-Pack = 1 fruta elegida,
    // pero son 3 clamshells de esa misma fruta
    tipo = "clamshell";
    mult = 3;
    var partes = nombreRaw.split("·");
    if (partes.length > 1) {
      frutas = partes[1].trim().split("+").map(function(f){ return normalizarFruta(f.trim()); });
    }
  } else if (nombreRaw.indexOf("Individual (clamshell)") !== -1 || nombreRaw.indexOf("Ludo Select") !== -1 || nombreRaw.indexOf("Ludo Berry Select") !== -1 || nombreRaw.indexOf("Ludo Mix") !== -1 || nombreRaw.indexOf("Ludo Berry Mix") !== -1 || nombreRaw.indexOf("Ludo Fresh") !== -1 || nombreRaw.indexOf("Cherry Mix") !== -1) {
    tipo = "clamshell";
    var partes = nombreRaw.split("·");
    if (partes.length > 1) {
      frutas = partes[1].trim().split("+").map(function(f){ return normalizarFruta(f.trim()); });
    }
  } else if (nombreRaw === "Fresa 2 paquetes" || nombreRaw === "Fresa 3 paquetes" || nombreRaw === "Fresa 2-Pack" || nombreRaw === "Fresa 3-Pack") {
    // Paquetes de fresa = N unidades de "Fresa" empaquetadas en una sola línea de pedido
    tipo = "fruta_suelta";
    frutas = ["Fresa"];
    mult = (nombreRaw === "Fresa 2 paquetes" || nombreRaw === "Fresa 2-Pack") ? 2 : 3;
  } else if (nombreRaw.indexOf("Familiar (bote)") !== -1) {
    tipo = "familiar";
    var partes = nombreRaw.split("·");
    if (partes.length > 1) {
      frutas = partes[1].trim().split("+").map(function(f){ return normalizarFruta(f.trim()); });
    }
  } else if (HIST_COSTO_ELOTE.hasOwnProperty(normalizarProducto(nombreRaw))) {
    // "Ludo Antojo" es el nombre viejo de "Elote Select" — se normaliza para
    // costearse y agruparse junto con las ventas actuales del mismo producto.
    tipo = "elote";
    frutas = [normalizarProducto(nombreRaw)];
  } else if (HIST_COSTO_PIEZA.hasOwnProperty(nombreRaw)) {
    // Productos de Ludo Mercado vendidos por pieza fija (coco, pitahaya).
    tipo = "pieza_directa";
    frutas = [nombreRaw];
  } else if (parseSufijoUnidad(nombreRaw) && HIST_COSTO_PROVEEDOR_KG.hasOwnProperty(parseSufijoUnidad(nombreRaw).base)) {
    // Frutas de Ludo Mercado vendidas por kg, guardadas como "Nombre (N kg/g/pza)".
    var suf = parseSufijoUnidad(nombreRaw);
    tipo = "mercado_kg";
    frutas = [suf.base];
    var catRef = CATALOGO.find(function(c){ return c.nombre === suf.base; });
    kgEquivalente = catRef ? cantidadAKg(catRef, suf.cantidad, suf.unidad) : suf.cantidad;
  } else if (HIST_COSTO_PROVEEDOR.hasOwnProperty(nombreRaw) || HIST_COSTO_PROVEEDOR_CLAMSHELL.hasOwnProperty(nombreRaw) || HIST_COSTO_PROVEEDOR_KG.hasOwnProperty(nombreRaw)) {
    tipo = "fruta_suelta";
    frutas = [normalizarFruta(nombreRaw)];
  }

  return { tipo: tipo, frutas: frutas, qty: qty, mult: mult, kgEquivalente: kgEquivalente };
}

/**
 * Calcula la compra al proveedor a partir de los pedidos filtrados.
 * Lógica: 1 bote de 500g = 3 cajas (clamshells).
 * Retorna:
 *   berries: { [fruta]: { cajasNecesarias, botesComprar, cajasDisponibles, merma(cajas), costoProveedor, clienteDetalle } }
 *   elotes:  { [nombre]: { piezas, costoUnitario, costoTotal, clienteDetalle } }
 *   ventaTotal, costoTotalProveedor, gananciaNeta
 */
function calcularCompraProveedor(datos, fecha) {
  // La fecha determina qué costo de proveedor aplica (ver HIST_COSTO_PROVEEDOR*
  // arriba). Si no se pasa explícitamente, se toma de la fecha de entrega del
  // primer pedido del lote (todas las llamadas agrupan por una sola fecha).
  fecha = fecha || fmtFecha(datos[0] && datos[0][6]);
  var berries = {};   // fruta -> { cajas, clientes: [{nombre, cajas}] }
  var elotes  = {};
  var piezasDirectas = {};
  var mercadoKg = {};
  var otros = {}; // cualquier producto que no encaje en las categorías de arriba
  var ventaTotal = 0;

  datos.forEach(function(r) {
    var nombreRaw = r[0] || "";
    var qty       = parseFloat(r[1]) || 1;
    var cliente   = r[2] || "?";
    var precioU   = parseFloat(r[3]) || 0;
    var costoFila = parseFloat(r[7]) || 0; // Subtotal costo, ya calculado al capturar el pedido
    ventaTotal   += precioU * qty;

    var p = parsearProducto(nombreRaw, qty);
    if (!p.tipo) {
      // Producto sin categoría reconocida (ej. un rename viejo en Sheets, o un producto nuevo
      // que aún no se conecta a ninguna categoría): se usa el costo ya guardado en la fila
      // en vez de recalcularlo, para no perderlo.
      if (!otros[nombreRaw]) otros[nombreRaw] = { unidades:0, costoTotal:0, ventaTotal:0, clientes:[] };
      otros[nombreRaw].unidades += qty;
      otros[nombreRaw].costoTotal += costoFila;
      otros[nombreRaw].ventaTotal += precioU * qty;
      otros[nombreRaw].clientes.push({ nombre: cliente, unidades: qty });
      return;
    }

    if (p.tipo === "elote") {
      var enombre = p.frutas[0];
      if (!elotes[enombre]) elotes[enombre] = { piezas:0, clientes:[] };
      elotes[enombre].piezas += qty;
      elotes[enombre].clientes.push({ nombre: cliente, piezas: qty });

    } else if (p.tipo === "pieza_directa") {
      var pn = p.frutas[0];
      if (!piezasDirectas[pn]) piezasDirectas[pn] = { piezas:0, clientes:[] };
      piezasDirectas[pn].piezas += qty;
      piezasDirectas[pn].clientes.push({ nombre: cliente, piezas: qty });

    } else if (p.tipo === "mercado_kg") {
      var mn = p.frutas[0];
      if (!mercadoKg[mn]) mercadoKg[mn] = { kg:0, clientes:[] };
      mercadoKg[mn].kg += p.kgEquivalente;
      mercadoKg[mn].clientes.push({ nombre: cliente, kg: p.kgEquivalente });

    } else if (p.tipo === "fruta_suelta") {
      var fn = p.frutas[0];
      var multFS = p.mult || 1;
      if (!berries[fn]) berries[fn] = { cajas:0, cajasF:0, cajasC:0, clientes:[] };
      if (HIST_COSTO_PROVEEDOR_CLAMSHELL.hasOwnProperty(fn)) {
        var cajasAporteC = qty * multFS;
        berries[fn].cajas += cajasAporteC;
        berries[fn].cajasC += cajasAporteC;
        berries[fn].clientes.push({ nombre: cliente, cajasF: 0, cajasC: cajasAporteC });
      } else {
        var cajasAporte = qty * multFS * CAJAS_POR_BOTE;
        berries[fn].cajas += cajasAporte;
        berries[fn].cajasF += cajasAporte;
        berries[fn].clientes.push({ nombre: cliente, cajasF: cajasAporte, cajasC: 0 });
      }

    } else if (p.tipo === "clamshell") {
      var cajasPorFruta = qty * (p.mult || 1);
      p.frutas.forEach(function(fn) {
        if (!fn || !isBerry(fn)) return;
        if (!berries[fn]) berries[fn] = { cajas:0, cajasF:0, cajasC:0, clientes:[] };
        berries[fn].cajas += cajasPorFruta;
        berries[fn].cajasC += cajasPorFruta;
        berries[fn].clientes.push({ nombre: cliente, cajasF: 0, cajasC: cajasPorFruta });
      });

    } else if (p.tipo === "familiar") {
      p.frutas.forEach(function(fn) {
        if (!fn || !isBerry(fn)) return;
        if (!berries[fn]) berries[fn] = { cajas:0, cajasF:0, cajasC:0, clientes:[] };
        var cajasAporte = qty * CAJAS_POR_BOTE;
        berries[fn].cajas += cajasAporte;
        berries[fn].cajasF += cajasAporte;
        berries[fn].clientes.push({ nombre: cliente, cajasF: cajasAporte, cajasC: 0 });
      });
    }
  });

  var berriesResult = {};
  var costoTotalBerries = 0;
  Object.keys(berries).forEach(function(fn) {
    var cajasNec = berries[fn].cajas;
    var esPorClamshell = HIST_COSTO_PROVEEDOR_CLAMSHELL.hasOwnProperty(fn);
    var esPorKg        = HIST_COSTO_PROVEEDOR_KG.hasOwnProperty(fn);
    var costoP, botesComprar, cajasDisp, merma, kgComprar, vig;

    if (esPorClamshell) {
      vig = costoVigente(HIST_COSTO_PROVEEDOR_CLAMSHELL[fn], fecha);
      botesComprar = cajasNec;
      cajasDisp = cajasNec;
      merma = 0;
      costoP = cajasNec * vig.costo;
      kgComprar = botesComprar * 0.2;
    } else if (esPorKg) {
      vig = costoVigente(HIST_COSTO_PROVEEDOR_KG[fn], fecha);
      kgComprar = +(cajasNec * 0.5 / CAJAS_POR_BOTE).toFixed(2);
      costoP = kgComprar * vig.costo;
      botesComprar = 0;
      cajasDisp = cajasNec;
      merma = 0;
    } else {
      vig = costoVigente(HIST_COSTO_PROVEEDOR[fn], fecha);
      botesComprar = Math.ceil(cajasNec / CAJAS_POR_BOTE);
      cajasDisp = botesComprar * CAJAS_POR_BOTE;
      merma = cajasDisp - cajasNec;
      costoP = botesComprar * vig.costo;
      kgComprar = botesComprar * 0.5;
    }
    costoTotalBerries += costoP;

    var cMap = {};
    berries[fn].clientes.forEach(function(c){
      if (!cMap[c.nombre]) cMap[c.nombre] = { cajasF:0, cajasC:0 };
      cMap[c.nombre].cajasF += c.cajasF;
      cMap[c.nombre].cajasC += c.cajasC;
    });

    var totalBotesVendidos      = Math.floor((berries[fn].cajasF||0) / CAJAS_POR_BOTE);
    var totalClamshellsVendidos = berries[fn].cajasC || 0;

    berriesResult[fn] = {
      cajasNecesarias: cajasNec,
      botesComprar: botesComprar,
      costoProveedor: +costoP.toFixed(2),
      costoUnitario: vig.costo,
      costoVigenteDesde: vig.desde,
      cajasDisponibles: cajasDisp,
      mermaGramos: merma,
      esPorClamshell: esPorClamshell,
      esPorKg: esPorKg,
      kgComprar: kgComprar,
      botesVendidos: totalBotesVendidos,
      clamshellsVendidos: totalClamshellsVendidos,
      clienteDetalle: Object.entries(cMap).map(function(e){
        return {
          nombre: e[0],
          gramos: e[1].cajasF + e[1].cajasC,
          botesVendidos: Math.floor(e[1].cajasF / CAJAS_POR_BOTE),
          clamshellsVendidos: e[1].cajasC
        };
      })
    };
  });

  // Ludo Berry Max — desglose por pedido de qué comprar (1 Fresa + 1 de cada fruta elegida),
  // usando el costo por bote ya calculado arriba para cada fruta. Solo informativo/visual:
  // no se suma aparte a costoTotalProveedor (esas cajas ya están contadas dentro de `berries`).
  var ludoBerryMaxResult = [];
  datos.forEach(function(r) {
    var nombreRaw = r[0] || "";
    if (nombreRaw.indexOf("Ludo Berry Max") === -1) return;
    var qty = parseFloat(r[1]) || 1;
    var p = parsearProducto(nombreRaw, qty);
    var items = p.frutas.map(function(fn) {
      var costoU = berriesResult[fn] ? berriesResult[fn].costoUnitario : 0;
      return { fruta: fn, cantidad: qty, costoUnitario: costoU, subtotal: costoU * qty };
    });
    ludoBerryMaxResult.push({
      cliente: r[2] || "?",
      items: items,
      total: items.reduce(function(s, it) { return s + it.subtotal; }, 0)
    });
  });

  var elotesResult = {};
  var costoTotalElotes = 0;
  Object.keys(elotes).forEach(function(en) {
    var piezas = elotes[en].piezas;
    var vigE = costoVigente(HIST_COSTO_ELOTE[en], fecha);
    var costoU = vigE.costo || 0;
    var costoT = piezas * costoU;
    costoTotalElotes += costoT;
    var cMap = {};
    elotes[en].clientes.forEach(function(c){ cMap[c.nombre]=(cMap[c.nombre]||0)+c.piezas; });
    elotesResult[en] = {
      piezas: piezas,
      costoUnitario: costoU,
      costoVigenteDesde: vigE.desde,
      costoTotal: costoT,
      clienteDetalle: Object.entries(cMap).map(function(e){ return {nombre:e[0], piezas:e[1]}; })
    };
  });

  var piezasResult = {};
  var costoTotalPiezas = 0;
  Object.keys(piezasDirectas).forEach(function(pn) {
    var piezas = piezasDirectas[pn].piezas;
    var vigP = costoVigente(HIST_COSTO_PIEZA[pn], fecha);
    var costoU = vigP.costo || 0;
    var costoT = piezas * costoU;
    costoTotalPiezas += costoT;
    var cMap = {};
    piezasDirectas[pn].clientes.forEach(function(c){ cMap[c.nombre]=(cMap[c.nombre]||0)+c.piezas; });
    piezasResult[pn] = {
      piezas: piezas,
      costoUnitario: costoU,
      costoVigenteDesde: vigP.desde,
      costoTotal: +costoT.toFixed(2),
      clienteDetalle: Object.entries(cMap).map(function(e){ return {nombre:e[0], piezas:e[1]}; })
    };
  });

  var mercadoKgResult = {};
  var costoTotalMercado = 0;
  Object.keys(mercadoKg).forEach(function(mn) {
    var kgNec = +mercadoKg[mn].kg.toFixed(3);
    var vigM = costoVigente(HIST_COSTO_PROVEEDOR_KG[mn], fecha);
    var costoU = vigM.costo || 0;
    var costoT = kgNec * costoU;
    costoTotalMercado += costoT;
    var cMap = {};
    mercadoKg[mn].clientes.forEach(function(c){ cMap[c.nombre]=(cMap[c.nombre]||0)+c.kg; });
    mercadoKgResult[mn] = {
      kgNecesarios: kgNec,
      costoUnitario: costoU,
      costoVigenteDesde: vigM.desde,
      costoTotal: +costoT.toFixed(2),
      clienteDetalle: Object.entries(cMap).map(function(e){ return {nombre:e[0], kg:+e[1].toFixed(3)}; })
    };
  });

  var otrosResult = {};
  var costoTotalOtros = 0;
  Object.keys(otros).forEach(function(pn) {
    var o = otros[pn];
    costoTotalOtros += o.costoTotal;
    var cMap = {};
    o.clientes.forEach(function(c){ cMap[c.nombre]=(cMap[c.nombre]||0)+c.unidades; });
    otrosResult[pn] = {
      unidades: o.unidades,
      costoTotal: +o.costoTotal.toFixed(2),
      ventaTotal: +o.ventaTotal.toFixed(2),
      clienteDetalle: Object.entries(cMap).map(function(e){ return {nombre:e[0], unidades:e[1]}; })
    };
  });

  var costoTotalProveedor = costoTotalBerries + costoTotalElotes + costoTotalPiezas + costoTotalMercado + costoTotalOtros;
  var gananciaNeta = ventaTotal - costoTotalProveedor;

  return {
    berries: berriesResult,
    elotes: elotesResult,
    piezas: piezasResult,
    mercadoKg: mercadoKgResult,
    otros: otrosResult,
    ludoBerryMax: ludoBerryMaxResult,
    ventaTotal: ventaTotal,
    costoTotalProveedor: costoTotalProveedor,
    gananciaNeta: gananciaNeta
  };
}

function renderProveedor() {
  var filtro = document.getElementById("fechaFiltroP").value;
  var container = document.getElementById("proveedorResumen");
  container.innerHTML = "";

  if (!filtro) {
    container.innerHTML = "<p style='text-align:center;color:#5a8a5a;padding:40px'>📅 Selecciona una fecha para ver el pedido al proveedor</p>";
    return;
  }

  var datos = proveedorData.filter(function(r){ return fmtFecha(r[6])===filtro; });

  if (datos.length === 0) {
    container.innerHTML = "<p style='text-align:center;color:#5a8a5a;padding:40px'>No hay pedidos para esta fecha</p>";
    return;
  }

  var calc = calcularCompraProveedor(datos, filtro);
  var B = calc.berries, E = calc.elotes, P = calc.piezas, M = calc.mercadoKg, O = calc.otros, MAX = calc.ludoBerryMax;

  // ── Resumen superior ──
  var gnClass = calc.gananciaNeta < 0 ? "rojo" : "";
  var sumDiv = document.createElement("div");
  sumDiv.className = "prov-summary";
  sumDiv.innerHTML =
    '<div><div class="prov-stat-label">VENTA TOTAL</div><div class="prov-stat-val">$'+calc.ventaTotal.toFixed(0)+'</div></div>'+
    '<div><div class="prov-stat-label">PAGO PROVEEDOR</div><div class="prov-stat-val naranja">$'+calc.costoTotalProveedor.toFixed(0)+'</div></div>'+
    '<div><div class="prov-stat-label">GANANCIA NETA</div><div class="prov-stat-val '+gnClass+'">$'+calc.gananciaNeta.toFixed(0)+'</div></div>';
  container.appendChild(sumDiv);

  // ── Tarjeta por fruta ──
  Object.keys(B).sort().forEach(function(fn) {
    var b = B[fn];
    var emoji = emojiDeFruta(fn);
    var maxGramos = Math.max.apply(null, b.clienteDetalle.map(function(c){return c.gramos;}));

    var unidadSing = b.esPorClamshell ? "clamshell" : "bote";
    var unidadPlur = b.esPorClamshell ? "clamshells" : "botes";
    var unidadMerma = b.esPorClamshell ? "clamshell" : "caja";
    var unidadMermaP = b.esPorClamshell ? "clamshells" : "cajas";

    var mermaHTML = b.mermaGramos === 0
      ? '<span class="merma-pill merma-ok">✅ Sin merma</span>'
      : '<span class="merma-pill merma-warn">⚠️ '+b.mermaGramos+' '+(b.mermaGramos!==1?unidadMermaP:unidadMerma)+'</span>';

    var barras = b.clienteDetalle.map(function(cd) {
      var pct = maxGramos > 0 ? Math.round(cd.gramos/maxGramos*100) : 0;
      var cdParts = [];
      if (b.esPorKg) {
        cdParts.push(cd.gramos+' cj');
      } else {
        if (cd.botesVendidos > 0) cdParts.push(cd.botesVendidos+' bote'+(cd.botesVendidos!==1?'s':''));
        if (cd.clamshellsVendidos > 0) cdParts.push(cd.clamshellsVendidos+' clamshell'+(cd.clamshellsVendidos!==1?'s':''));
      }
      return '<div class="cliente-bar-row">'+
        '<span class="cliente-bar-name">'+cd.nombre+'</span>'+
        '<div class="cliente-bar-track"><div class="cliente-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="cliente-bar-grams">'+(cdParts.join(' + ')||'0')+'</span>'+
      '</div>';
    }).join("");

    var labelPedidas, valPedidas, labelDisp, valDisp, labelMerma, valMerma;
    if (b.esPorKg) {
      labelPedidas = "CAJAS PEDIDAS"; valPedidas = b.cajasNecesarias+" cj";
      labelDisp    = "CAJAS DISPONIBLES"; valDisp = b.cajasDisponibles+" cj";
      labelMerma   = "MERMA"; valMerma = b.mermaGramos+" cj";
    } else if (b.esPorClamshell) {
      labelPedidas = "CLAMSHELLS PEDIDOS"; valPedidas = b.botesComprar+" clamshell"+(b.botesComprar!==1?"s":"");
      labelDisp    = "DISPONIBLES"; valDisp = b.cajasDisponibles+" clamshell"+(b.cajasDisponibles!==1?"s":"");
      labelMerma   = "MERMA"; valMerma = b.mermaGramos+" clamshell"+(b.mermaGramos!==1?"s":"");
    } else {
      var vendParts = [];
      if (b.botesVendidos > 0) vendParts.push(b.botesVendidos+' bote'+(b.botesVendidos!==1?'s':''));
      if (b.clamshellsVendidos > 0) vendParts.push(b.clamshellsVendidos+' clamshell'+(b.clamshellsVendidos!==1?'s':''));
      labelPedidas = "BOTES PEDIDOS"; valPedidas = b.botesComprar+" bote"+(b.botesComprar!==1?"s":"");
      labelDisp    = "VENDIDOS"; valDisp = vendParts.join(' + ') || '0';
      labelMerma   = "MERMA"; valMerma = b.mermaGramos+" clamshell"+(b.mermaGramos!==1?"s":"");
    }

    var card = document.createElement("div");
    card.className = "fruta-card";
    card.innerHTML =
      '<div class="fruta-card-header">'+
        '<div>'+
          '<div class="fruta-card-title">'+emoji+' '+fn+'</div>'+
          '<div style="margin-top:5px">'+mermaHTML+'</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div class="fruta-botes-big">'+(b.esPorKg ? b.kgComprar.toFixed(2) : b.botesComprar)+'</div>'+
          '<div class="fruta-botes-label">'+(b.esPorKg ? 'kg&nbsp;·&nbsp;$'+b.costoProveedor : b.esPorClamshell ? 'clamshell'+(b.botesComprar!==1?"s":"")+'&nbsp;·&nbsp;$'+b.costoProveedor : 'bote'+(b.botesComprar!==1?"s":"")+'&nbsp;·&nbsp;$'+b.costoProveedor)+'</div>'+
          (b.esPorKg ? '' : '<div class="fruta-botes-label" style="color:#a8e6a3;font-size:12px;margin-top:2px">'+b.kgComprar.toFixed(1)+' kg</div>')+
          '<div class="fruta-botes-label" style="color:#6b9e6b;font-size:10px;margin-top:3px">costo $'+b.costoUnitario+(b.esPorKg?'/kg':b.esPorClamshell?'/clamshell':'/bote')+' · vigente desde '+b.costoVigenteDesde+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="fruta-stats-row">'+
        '<div class="fstat"><div class="fstat-label">'+labelPedidas+'</div><div class="fstat-val">'+valPedidas+'</div></div>'+
        '<div class="fstat"><div class="fstat-label">'+labelDisp+'</div><div class="fstat-val">'+valDisp+'</div></div>'+
        '<div class="fstat"><div class="fstat-label">'+labelMerma+'</div><div class="fstat-val '+(b.mermaGramos>0?'naranja':'')+'">'+valMerma+'</div></div>'+
      '</div>'+
      '<div class="clientes-block">'+
        '<div class="clientes-block-title">DISTRIBUCIÓN POR CLIENTE</div>'+
        barras+
      '</div>';
    container.appendChild(card);
  });

  // ── Tarjeta Ludo Berry Max — qué comprar por pedido (1 de cada fruta elegida) ──
  // Solo informativo: las cajas de Fresa/Zarzamora/Frambuesa/Blueberry que necesita
  // cada pedido de Max ya están sumadas dentro de las tarjetas por fruta de arriba;
  // esta tarjeta solo desglosa esa necesidad por pedido para que quede claro qué comprar.
  if (MAX && MAX.length > 0) {
    var mcard = document.createElement("div");
    mcard.className = "elote-card";
    var totalMax = MAX.reduce(function(s,o){ return s+o.total; }, 0);
    mcard.innerHTML = '<div class="elote-card-header"><div style="font-size:16px;font-weight:bold;color:#e8f5e8">✨ Ludo Berry Max — qué comprar</div><span style="color:#ffcc02;font-weight:bold;font-size:15px">$'+totalMax.toFixed(0)+'</span></div>';
    MAX.forEach(function(o){
      var mrow = document.createElement("div");
      mrow.className = "elote-row";
      mrow.innerHTML =
        '<div>'+
          '<div style="color:#e8f5e8">'+o.cliente+'</div>'+
          '<div style="color:#6b9e6b;font-size:11px;margin-top:3px">'+
            o.items.map(function(it){ return emojiDeFruta(it.fruta)+' '+it.cantidad+' '+it.fruta+' ($'+it.subtotal.toFixed(0)+')'; }).join(' · ')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="color:#a8e6a3;font-size:13px;font-weight:bold">= $'+o.total.toFixed(0)+'</div>'+
        '</div>';
      mcard.appendChild(mrow);
    });
    container.appendChild(mcard);
  }

  // ── Tarjeta elotes ──
  if (Object.keys(E).length > 0) {
    var ecard = document.createElement("div");
    ecard.className = "elote-card";
    var etotal = Object.values(E).reduce(function(s,e){return s+e.costoTotal;},0);
    ecard.innerHTML = '<div class="elote-card-header"><div style="font-size:16px;font-weight:bold;color:#e8f5e8">🌽 Elotes</div><span style="color:#ffcc02;font-weight:bold;font-size:15px">$'+etotal.toFixed(0)+'</span></div>';
    Object.keys(E).forEach(function(en){
      var e = E[en];
      var erow = document.createElement("div");
      erow.className = "elote-row";
      erow.innerHTML =
        '<div>'+
          '<div style="color:#e8f5e8">'+en+'</div>'+
          '<div style="color:#6b9e6b;font-size:11px;margin-top:3px">'+
            e.clienteDetalle.map(function(cd){return cd.nombre+': '+cd.piezas+'pz';}).join(' · ')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="color:#ffcc02;font-weight:bold">'+e.piezas+' pz × $'+e.costoUnitario+'</div>'+
          '<div style="color:#a8e6a3;font-size:13px">= $'+e.costoTotal+'</div>'+
          '<div style="color:#6b9e6b;font-size:10px;margin-top:2px">vigente desde '+e.costoVigenteDesde+'</div>'+
        '</div>';
      ecard.appendChild(erow);
    });
    container.appendChild(ecard);
  }

  // ── Tarjeta piezas directas (Ludo Mercado: coco, pitahaya...) ──
  if (Object.keys(P).length > 0) {
    var pcard = document.createElement("div");
    pcard.className = "elote-card";
    var ptotal = Object.values(P).reduce(function(s,p){return s+p.costoTotal;},0);
    pcard.innerHTML = '<div class="elote-card-header"><div style="font-size:16px;font-weight:bold;color:#e8f5e8">🥥 Piezas</div><span style="color:#ffcc02;font-weight:bold;font-size:15px">$'+ptotal.toFixed(0)+'</span></div>';
    Object.keys(P).sort().forEach(function(pn){
      var p = P[pn];
      var prow = document.createElement("div");
      prow.className = "elote-row";
      prow.innerHTML =
        '<div>'+
          '<div style="color:#e8f5e8">'+emojiDeFruta(pn)+' '+pn+'</div>'+
          '<div style="color:#6b9e6b;font-size:11px;margin-top:3px">'+
            p.clienteDetalle.map(function(cd){return cd.nombre+': '+cd.piezas+'pz';}).join(' · ')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="color:#ffcc02;font-weight:bold">'+p.piezas+' pz × $'+p.costoUnitario+'</div>'+
          '<div style="color:#a8e6a3;font-size:13px">= $'+p.costoTotal.toFixed(2)+'</div>'+
          '<div style="color:#6b9e6b;font-size:10px;margin-top:2px">vigente desde '+p.costoVigenteDesde+'</div>'+
        '</div>';
      pcard.appendChild(prow);
    });
    container.appendChild(pcard);
  }

  // ── Tarjeta Ludo Mercado por kg (limón, tuna, maracuyá, rambután, ciruela) ──
  if (Object.keys(M).length > 0) {
    var mcard = document.createElement("div");
    mcard.className = "elote-card";
    var mtotal = Object.values(M).reduce(function(s,m){return s+m.costoTotal;},0);
    mcard.innerHTML = '<div class="elote-card-header"><div style="font-size:16px;font-weight:bold;color:#e8f5e8">🥭 Mercado (kg)</div><span style="color:#ffcc02;font-weight:bold;font-size:15px">$'+mtotal.toFixed(0)+'</span></div>';
    Object.keys(M).sort().forEach(function(mn){
      var m = M[mn];
      var mrow = document.createElement("div");
      mrow.className = "elote-row";
      mrow.innerHTML =
        '<div>'+
          '<div style="color:#e8f5e8">'+emojiDeFruta(mn)+' '+mn+'</div>'+
          '<div style="color:#6b9e6b;font-size:11px;margin-top:3px">'+
            m.clienteDetalle.map(function(cd){return cd.nombre+': '+cd.kg+'kg';}).join(' · ')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="color:#ffcc02;font-weight:bold">'+m.kgNecesarios+' kg × $'+m.costoUnitario+'</div>'+
          '<div style="color:#a8e6a3;font-size:13px">= $'+m.costoTotal.toFixed(2)+'</div>'+
          '<div style="color:#6b9e6b;font-size:10px;margin-top:2px">vigente desde '+m.costoVigenteDesde+'</div>'+
        '</div>';
      mcard.appendChild(mrow);
    });
    container.appendChild(mcard);
  }

  // ── Tarjeta "Otros" (productos sin categoría específica, ej. paquetes o combos
  //     no reconocidos por nombre — usa el costo ya guardado en cada pedido) ──
  if (Object.keys(O).length > 0) {
    var ocard = document.createElement("div");
    ocard.className = "elote-card";
    var ototal = Object.values(O).reduce(function(s,o){return s+o.costoTotal;},0);
    ocard.innerHTML = '<div class="elote-card-header"><div style="font-size:16px;font-weight:bold;color:#e8f5e8">📦 Otros</div><span style="color:#ffcc02;font-weight:bold;font-size:15px">$'+ototal.toFixed(0)+'</span></div>';
    Object.keys(O).sort().forEach(function(pn){
      var o = O[pn];
      var orow = document.createElement("div");
      orow.className = "elote-row";
      orow.innerHTML =
        '<div>'+
          '<div style="color:#e8f5e8">'+pn+'</div>'+
          '<div style="color:#6b9e6b;font-size:11px;margin-top:3px">'+
            o.clienteDetalle.map(function(cd){return cd.nombre+': '+cd.unidades;}).join(' · ')+
          '</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="color:#ffcc02;font-weight:bold">'+o.unidades+' × costo guardado</div>'+
          '<div style="color:#a8e6a3;font-size:13px">= $'+o.costoTotal.toFixed(2)+'</div>'+
        '</div>';
      ocard.appendChild(orow);
    });
    container.appendChild(ocard);
  }

  // ── Bloque "Pedido para proveedor" ──
  var pedidoBox = document.createElement("div");
  pedidoBox.className = "pedido-box";

  var labelFecha = filtro ? filtro : "todas las fechas";
  var lineas = ["📦 Pedido berries — "+labelFecha];
  lineas.push("");
  Object.keys(B).sort().forEach(function(fn){
    var b = B[fn];
    var precioKgCopy = Math.round(b.costoProveedor / b.kgComprar);
    var formulaCopy = precioKgCopy+" × "+b.kgComprar.toFixed(2)+" kg = $"+b.costoProveedor;
    if (b.esPorKg) {
      lineas.push(fn+": "+b.kgComprar.toFixed(2)+" kg — $"+b.costoProveedor);
    } else {
      var unidad = b.esPorClamshell ? "clamshell" : "bote";
      lineas.push(fn+": "+b.botesComprar+" "+unidad+(b.botesComprar!==1?"s":"")+" ("+b.kgComprar.toFixed(1)+" kg) — $"+b.costoProveedor);
    }
    lineas.push("  "+formulaCopy);
  });
  Object.keys(E).sort().forEach(function(en){
    var e = E[en];
    lineas.push(en+": "+e.piezas+" pz — $"+e.costoTotal);
  });
  Object.keys(P).sort().forEach(function(pn){
    var p = P[pn];
    lineas.push(pn+": "+p.piezas+" pz — $"+p.costoTotal.toFixed(2));
  });
  Object.keys(M).sort().forEach(function(mn){
    var m = M[mn];
    lineas.push(mn+": "+m.kgNecesarios+" kg — $"+m.costoTotal.toFixed(2));
  });
  Object.keys(O).sort().forEach(function(pn){
    var o = O[pn];
    lineas.push(pn+": "+o.unidades+" — $"+o.costoTotal.toFixed(2));
  });
  lineas.push("");
  lineas.push("Total a pagar: $"+calc.costoTotalProveedor.toFixed(0));
  var textoCompleto = lineas.join("\n");

  var headerHTML = '<div class="pedido-box-header">'+
    '<span class="pedido-box-title">📋 PEDIDO PARA PROVEEDOR</span>'+
    '<button class="copy-btn" id="copyPedidoBtn">📋 Copiar</button>'+
  '</div>';

  var lineasHTML = "";
  Object.keys(B).sort().forEach(function(fn){
    var b = B[fn];
    var emoji = emojiDeFruta(fn);
    var precioKg = Math.round(b.costoProveedor / b.kgComprar);
    var formula = precioKg+' × '+b.kgComprar.toFixed(2)+' kg = $'+b.costoProveedor;
    var cantLabel;
    if (b.esPorKg) {
      cantLabel = b.kgComprar.toFixed(2)+' kg';
    } else {
      var unidad = b.esPorClamshell ? "clamshell" : "bote";
      cantLabel = b.botesComprar+' '+unidad+(b.botesComprar!==1?"s":"")+'&nbsp;·&nbsp;'+b.kgComprar.toFixed(1)+' kg';
    }
    lineasHTML += '<div class="pedido-line" style="flex-direction:column;align-items:stretch;gap:3px">'+
      '<div style="display:flex;justify-content:space-between;align-items:baseline">'+
        '<span class="pedido-fruta">'+emoji+' '+fn+'<span class="pedido-cant">'+cantLabel+'</span></span>'+
        '<span class="pedido-costo">$'+b.costoProveedor+'</span>'+
      '</div>'+
      '<div style="font-size:11px;color:#6b9e6b;letter-spacing:0.3px">'+formula+'</div>'+
    '</div>';
  });
  Object.keys(E).sort().forEach(function(en){
    var e = E[en];
    lineasHTML += '<div class="pedido-line">'+
      '<span class="pedido-fruta">🌽 '+en+'<span class="pedido-cant">'+e.piezas+' pz</span></span>'+
      '<span class="pedido-costo">$'+e.costoTotal+'</span>'+
    '</div>';
  });
  Object.keys(P).sort().forEach(function(pn){
    var p = P[pn];
    lineasHTML += '<div class="pedido-line">'+
      '<span class="pedido-fruta">'+emojiDeFruta(pn)+' '+pn+'<span class="pedido-cant">'+p.piezas+' pz</span></span>'+
      '<span class="pedido-costo">$'+p.costoTotal.toFixed(2)+'</span>'+
    '</div>';
  });
  Object.keys(M).sort().forEach(function(mn){
    var m = M[mn];
    lineasHTML += '<div class="pedido-line">'+
      '<span class="pedido-fruta">'+emojiDeFruta(mn)+' '+mn+'<span class="pedido-cant">'+m.kgNecesarios+' kg</span></span>'+
      '<span class="pedido-costo">$'+m.costoTotal.toFixed(2)+'</span>'+
    '</div>';
  });
  Object.keys(O).sort().forEach(function(pn){
    var o = O[pn];
    lineasHTML += '<div class="pedido-line">'+
      '<span class="pedido-fruta">📦 '+pn+'<span class="pedido-cant">'+o.unidades+'</span></span>'+
      '<span class="pedido-costo">$'+o.costoTotal.toFixed(2)+'</span>'+
    '</div>';
  });
  var totalHTML = '<div class="pedido-total-row"><span>TOTAL A PAGAR</span><span>$'+calc.costoTotalProveedor.toFixed(0)+'</span></div>';

  pedidoBox.innerHTML = headerHTML + lineasHTML + totalHTML;
  container.appendChild(pedidoBox);

  document.getElementById("copyPedidoBtn").addEventListener("click", function(){
    navigator.clipboard.writeText(textoCompleto).then(function(){
      var btn = document.getElementById("copyPedidoBtn");
      btn.textContent = "✅ Copiado";
      setTimeout(function(){ btn.textContent = "📋 Copiar"; }, 2000);
    });
  });
}

cargarTablero();
</script>
</body>
</html>
